<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — DiscoveryOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563EB;
            --primary-hover: #1D4ED8;
            --primary-light: #EFF6FF;
            --bg-primary: #F7F9FC;
            --bg-card: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-tertiary: #94A3B8;
            --border-color: #E2E8F0;
            --danger: #DC2626;
            --danger-bg: #FEE2E2;
            --border-radius: 12px;
            --border-radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 48px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
        }
        .nav-brand {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.03em;
            text-decoration: none;
        }
        .nav-brand span { color: var(--primary-blue); }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
        }
        .auth-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 40px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.05);
        }
        .auth-header {
            margin-bottom: 32px;
        }
        .auth-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        .auth-header p {
            font-size: 13.5px;
            color: var(--text-secondary);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.01em;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg-card);
            transition: border-color 150ms ease, box-shadow 150ms ease;
            outline: none;
        }
        input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 11px;
            background: var(--primary-blue);
            color: #fff;
            border: none;
            border-radius: var(--border-radius-sm);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 150ms ease, transform 150ms ease;
            margin-top: 8px;
        }
        .btn-submit:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-submit:disabled { background: var(--text-tertiary); cursor: not-allowed; transform: none; }
        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .error-msg {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #FECACA;
            border-radius: var(--border-radius-sm);
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .hint {
            font-size: 11.5px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">Discovery<span>OS</span></a>
    </nav>
    <main>
        <div class="auth-box">
            <div class="auth-header">
                <h1>Create your account</h1>
                <p>Start analyzing customer feedback in minutes.</p>
            </div>

            <div class="error-msg" id="errorMsg"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="email">Work email</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="6">
                    <div class="hint">Minimum 6 characters</div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" autocomplete="new-password" required>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Log in</a>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = window.location.origin;

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters.';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch(`${API_BASE}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.detail || 'Signup failed');
                }
                localStorage.setItem('dos_token', data.access_token);
                localStorage.setItem('dos_email', data.email);
                window.location.href = '/app';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });

        // If already logged in, go to app
        if (localStorage.getItem('dos_token')) {
            window.location.href = '/app';
        }
    </script>
</body>
</html>
